name: System Files Extractor

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SamFW Direct Download Link'
        required: true
      extract_super_config:
        description: 'super config (Repack metadata for super.img)'
        type: boolean
        default: false
      extract_app:
        description: 'app (Preinstalled APKs)'
        type: boolean
        default: false
      extract_priv_app:
        description: 'priv-app (Privileged APKs)'
        type: boolean
        default: false
      extract_etc:
        description: 'etc (Configs & permissions)'
        type: boolean
        default: false
      extract_config:
        description: 'config (XML feature & permission configs)'
        type: boolean
        default: false
      extract_lib:
        description: 'lib (32-bit libraries)'
        type: boolean
        default: false
      extract_lib64:
        description: 'lib64 (64-bit libraries)'
        type: boolean
        default: false
      extract_media:
        description: 'media (Sounds, fonts, bootanimation)'
        type: boolean
        default: false
      extract_cameradata:
        description: 'cameradata (Camera tuning)'
        type: boolean
        default: false
      extract_build_prop:
        description: 'build.prop (Device properties)'
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            xz-utils \
            lz4 \
            unzip \
            curl \
            android-sdk-libsparse-utils \
            e2fsprogs

      - name: Make tools executable
        run: chmod +x bin/lp/* bin/ext4/* bin/erofs-utils/* bin/py_scripts/* upload_gofile.sh scripts/dump.sh

      - name: Build target list and extract
        run: |
          TARGETS=""
          ${{ github.event.inputs.extract_app }} && TARGETS="$TARGETS app"
          ${{ github.event.inputs.extract_priv_app }} && TARGETS="$TARGETS priv-app"
          ${{ github.event.inputs.extract_etc }} && TARGETS="$TARGETS etc"
          ${{ github.event.inputs.extract_config }} && TARGETS="$TARGETS config"
          ${{ github.event.inputs.extract_lib }} && TARGETS="$TARGETS lib"
          ${{ github.event.inputs.extract_lib64 }} && TARGETS="$TARGETS lib64"
          ${{ github.event.inputs.extract_media }} && TARGETS="$TARGETS media"
          ${{ github.event.inputs.extract_cameradata }} && TARGETS="$TARGETS cameradata"
          ${{ github.event.inputs.extract_build_prop }} && TARGETS="$TARGETS build.prop"

          TARGETS="${TARGETS# }"

          WANT_SUPER_CONFIG="${{ github.event.inputs.extract_super_config }}"

          # At least one must be selected
          if [ -z "$TARGETS" ] && [ "$WANT_SUPER_CONFIG" != "true" ]; then
            echo "❌ No targets selected!"
            exit 1
          fi

          echo "Targets: $TARGETS"
          echo "Super config: $WANT_SUPER_CONFIG"

          echo ""; echo "[1/6] Downloading firmware..."
          wget --no-check-certificate -O "firmware.zip" "${{ github.event.inputs.url }}" 2>&1 | tail -3
          [ ! -f "firmware.zip" ] && { echo "❌ Download failed"; exit 1; }
          echo "✅ Downloaded"

          echo ""; echo "[2/6] Extracting ZIP..."
          unzip -o "firmware.zip" >/dev/null 2>&1
          rm -f "firmware.zip"
          echo "✅ Done"

          echo ""; echo "[3/6] Extracting AP..."
          AP_FILE=$(find . -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n 1)
          [ -z "$AP_FILE" ] && { echo "❌ AP file not found"; exit 1; }
          tar -xf "$AP_FILE" >/dev/null 2>&1
          rm -f "$AP_FILE"
          echo "✅ Done"

          echo ""; echo "[4/6] Getting system.img..."
          SUPER_FILE=$(find . -maxdepth 1 -name "super.img*" | head -n 1)
          if [ -n "$SUPER_FILE" ]; then
            echo "  Found super.img — dynamic partition device"
            if [[ "$SUPER_FILE" == *.lz4 ]]; then
              lz4 -d "$SUPER_FILE" "super.img"
              SUPER_FILE="super.img"
            fi
            if file "$SUPER_FILE" | grep -q "sparse"; then
              simg2img "$SUPER_FILE" "super.raw.img" 2>/dev/null || bin/ext4/simg2img "$SUPER_FILE" "super.raw.img"
              SUPER_FILE="super.raw.img"
            fi
            mkdir -p super_dump
            bin/lp/lpunpack "$SUPER_FILE" super_dump

            # Save super config if requested
            if [ "$WANT_SUPER_CONFIG" = "true" ]; then
              mkdir -p output
              if [ -d "super_dump/configs" ]; then
                cp -r "super_dump/configs" "output/super_config"
                echo "✅ super config saved from super_dump/configs"
              elif [ -d "super_dump/config" ]; then
                cp -r "super_dump/config" "output/super_config"
                echo "✅ super config saved from super_dump/config"
              else
                # lpunpack on some versions outputs config files directly
                mkdir -p "output/super_config"
                find super_dump -maxdepth 1 -name "*.cfg" -o -name "*_partition*" -o -name "misc_info*" | \
                  xargs -I{} cp {} "output/super_config/" 2>/dev/null
                # Also save lpunpack metadata via lpdump
                bin/lp/lpdump "$SUPER_FILE" > "output/super_config/lpdump.txt" 2>/dev/null || true
                echo "✅ super config saved via lpdump"
              fi
            fi

            SYSTEM_IMG=$(find super_dump -name "system.img" -o -name "system_a.img" | head -n 1)
          else
            echo "  No super.img — legacy device (super config not available)"
            if [ "$WANT_SUPER_CONFIG" = "true" ]; then
              echo "  ⚠️ super config requested but this is a legacy device with no super.img"
            fi
            SYSTEM_IMG=$(find . -maxdepth 1 -name "system.img.lz4" -o -name "system.img" | head -n 1)
            if [[ "$SYSTEM_IMG" == *.lz4 ]]; then
              lz4 -d "$SYSTEM_IMG" "system_raw.img"
              SYSTEM_IMG="system_raw.img"
            fi
            if file "$SYSTEM_IMG" | grep -q "sparse"; then
              echo "  Converting sparse ext4..."
              simg2img "$SYSTEM_IMG" "system_unsparse.img" 2>/dev/null
              SYSTEM_IMG="system_unsparse.img"
            fi
          fi

          # If only super config was requested and no system targets, skip system extraction
          if [ -z "$TARGETS" ]; then
            echo "  No system targets — skipping system extraction"
          else
            [ -z "$SYSTEM_IMG" ] && { echo "❌ system.img not found"; exit 1; }
            echo "✅ Found: $SYSTEM_IMG"

            echo ""; echo "[5/6] Extracting system.img contents..."
            mkdir -p system_extracted

            SINGLE_FILES="build.prop floating_features.xml"

            if bin/erofs-utils/extract.erofs -i "$SYSTEM_IMG" -x -o system_extracted/ 2>/dev/null; then
              echo "✅ Extracted via erofs"
            else
              echo "  erofs failed — trying ext4 via debugfs..."
              for TARGET in $TARGETS; do
                echo "  Extracting $TARGET via debugfs..."
                IS_FILE=false
                for SF in $SINGLE_FILES; do
                  [ "$TARGET" = "$SF" ] && IS_FILE=true && break
                done
                if $IS_FILE; then
                  FOUND=false
                  for SRC_PATH in "$TARGET" "system/$TARGET"; do
                    if debugfs -R "stat $SRC_PATH" "$SYSTEM_IMG" 2>/dev/null | grep -q "Type: regular"; then
                      debugfs -R "dump $SRC_PATH system_extracted/$TARGET" "$SYSTEM_IMG" 2>/dev/null
                      FOUND=true
                      echo "  ✅ $TARGET found at /$SRC_PATH"
                      break
                    fi
                  done
                  $FOUND || echo "  ⚠️ $TARGET not found in image"
                else
                  FOUND=false
                  for SRC_PATH in "$TARGET" "system/$TARGET"; do
                    if debugfs -R "ls $SRC_PATH" "$SYSTEM_IMG" 2>/dev/null | grep -q .; then
                      mkdir -p "system_extracted/$TARGET"
                      debugfs -R "rdump $SRC_PATH system_extracted/$TARGET" "$SYSTEM_IMG" 2>/dev/null
                      FOUND=true
                      echo "  ✅ $TARGET found at /$SRC_PATH"
                      break
                    fi
                  done
                  $FOUND || echo "  ⚠️ $TARGET not found in image"
                fi
              done
              echo "✅ Extracted via debugfs"
            fi

            echo "Top level contents:"
            ls system_extracted/ || true

            echo ""; echo "[6/6] Copying selected targets..."
            mkdir -p output
            for TARGET in $TARGETS; do
              if [ -e "system_extracted/$TARGET" ]; then
                cp -r "system_extracted/$TARGET" "output/"
                echo "  ✅ $TARGET (direct)"
                continue
              fi
              for BASE in \
                "system_extracted/system" \
                "system_extracted/system_a" \
                "system_extracted/system/system" \
                "system_extracted/system_a/system"; do
                SRC="$BASE/$TARGET"
                if [ -e "$SRC" ]; then
                  cp -r "$SRC" "output/"
                  echo "  ✅ $TARGET (from $BASE)"
                  break
                fi
              done
              [ ! -e "output/$TARGET" ] && echo "  ⚠️ Not found: $TARGET"
            done
          fi

          sudo umount system_extracted/ 2>/dev/null || true
          rm -rf system_extracted super_dump super.img super.raw.img system_unsparse.img

          FILE_COUNT=$(ls output | wc -l)
          [ "$FILE_COUNT" -eq 0 ] && { echo "❌ Nothing extracted!"; exit 1; }
          echo "✅ Extracted $FILE_COUNT items"

      - name: Upload to GoFile
        run: |
          cd output
          zip -r ../system-files.zip .
          cd ..
          bash upload_gofile.sh system-files.zip
          
