name: System Files Extractor

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SamFW Direct Download Link'
        required: true
      extract_app:
        description: 'app (Preinstalled APKs)'
        type: boolean
        default: false
      extract_priv_app:
        description: 'priv-app (Privileged APKs)'
        type: boolean
        default: false
      extract_etc:
        description: 'etc (Configs & permissions)'
        type: boolean
        default: false
      extract_lib:
        description: 'lib (32-bit libraries)'
        type: boolean
        default: false
      extract_lib64:
        description: 'lib64 (64-bit libraries)'
        type: boolean
        default: false
      extract_media:
        description: 'media (Sounds, fonts, bootanimation)'
        type: boolean
        default: false
      extract_cameradata:
        description: 'cameradata (Camera tuning)'
        type: boolean
        default: false
      extract_build_prop:
        description: 'build.prop (Device properties)'
        type: boolean
        default: false
      extract_floating_features:
        description: 'floating_features.xml (Samsung feature flags)'
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            xz-utils \
            lz4 \
            unzip \
            curl \
            android-sdk-libsparse-utils

      - name: Make tools executable
        run: chmod +x bin/lp/* bin/ext4/* bin/erofs-utils/* bin/py_scripts/* upload_gofile.sh scripts/dump.sh

      - name: Build target list and extract
        run: |
          TARGETS=""
          ${{ github.event.inputs.extract_app }} && TARGETS="$TARGETS app"
          ${{ github.event.inputs.extract_priv_app }} && TARGETS="$TARGETS priv-app"
          ${{ github.event.inputs.extract_etc }} && TARGETS="$TARGETS etc"
          ${{ github.event.inputs.extract_lib }} && TARGETS="$TARGETS lib"
          ${{ github.event.inputs.extract_lib64 }} && TARGETS="$TARGETS lib64"
          ${{ github.event.inputs.extract_media }} && TARGETS="$TARGETS media"
          ${{ github.event.inputs.extract_cameradata }} && TARGETS="$TARGETS cameradata"
          ${{ github.event.inputs.extract_build_prop }} && TARGETS="$TARGETS build.prop"
          ${{ github.event.inputs.extract_floating_features }} && TARGETS="$TARGETS floating_features.xml"

          TARGETS="${TARGETS# }"

          if [ -z "$TARGETS" ]; then
            echo "❌ No targets selected!"
            exit 1
          fi

          echo "Targets: $TARGETS"

          echo ""; echo "[1/6] Downloading firmware..."
          wget --no-check-certificate -O "firmware.zip" "${{ github.event.inputs.url }}" 2>&1 | tail -3
          [ ! -f "firmware.zip" ] && { echo "❌ Download failed"; exit 1; }
          echo "✅ Downloaded"

          echo ""; echo "[2/6] Extracting ZIP..."
          unzip -o "firmware.zip" >/dev/null 2>&1
          rm -f "firmware.zip"
          echo "✅ Done"

          echo ""; echo "[3/6] Extracting AP..."
          AP_FILE=$(find . -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n 1)
          [ -z "$AP_FILE" ] && { echo "❌ AP file not found"; exit 1; }
          tar -xf "$AP_FILE" >/dev/null 2>&1
          rm -f "$AP_FILE"
          echo "✅ Done"

          echo ""; echo "[4/6] Extracting system.img from super..."
          SUPER_FILE=$(find . -maxdepth 1 -name "super.img*" | head -n 1)
          if [ -n "$SUPER_FILE" ]; then
            if [[ "$SUPER_FILE" == *.lz4 ]]; then
              lz4 -d "$SUPER_FILE" "super.img"
              SUPER_FILE="super.img"
            fi
            if file "$SUPER_FILE" | grep -q "sparse"; then
              simg2img "$SUPER_FILE" "super.raw.img" 2>/dev/null || bin/ext4/simg2img "$SUPER_FILE" "super.raw.img"
              SUPER_FILE="super.raw.img"
            fi
            mkdir -p super_dump
            bin/lp/lpunpack "$SUPER_FILE" super_dump
            SYSTEM_IMG=$(find super_dump -name "system.img" -o -name "system_a.img" | head -n 1)
          else
            SYSTEM_IMG=$(find . -maxdepth 1 -name "system.img.lz4" -o -name "system.img" | head -n 1)
            if [[ "$SYSTEM_IMG" == *.lz4 ]]; then
              lz4 -d "$SYSTEM_IMG" "system.img"
              SYSTEM_IMG="system.img"
            fi
          fi

          [ -z "$SYSTEM_IMG" ] && { echo "❌ system.img not found"; exit 1; }
          echo "✅ Found: $SYSTEM_IMG"

          echo ""; echo "[5/6] Mounting system.img..."
          mkdir -p system_mount
          # Try erofs first, fallback to ext4
          if bin/erofs-utils/fsck.erofs "$SYSTEM_IMG" >/dev/null 2>&1; then
            bin/erofs-utils/extract.erofs -i "$SYSTEM_IMG" -o system_mount/ >/dev/null 2>&1 || \
            sudo mount -o loop,ro "$SYSTEM_IMG" system_mount/ 2>/dev/null
          else
            sudo mount -o loop,ro "$SYSTEM_IMG" system_mount/ 2>/dev/null || \
            bin/ext4/ext2rd "$SYSTEM_IMG" -x system_mount/ 2>/dev/null
          fi
          echo "✅ Mounted"

          echo ""; echo "[6/6] Copying selected targets..."
          mkdir -p output
          for TARGET in $TARGETS; do
            SRC="system_mount/$TARGET"
            # Also check inside system/system/ (some Samsung firmware double-nests)
            [ ! -e "$SRC" ] && SRC="system_mount/system/$TARGET"
            if [ -e "$SRC" ]; then
              cp -r "$SRC" "output/"
              echo "  ✅ $TARGET"
            else
              echo "  ⚠️ Not found: $TARGET"
            fi
          done

          sudo umount system_mount/ 2>/dev/null || true
          rm -rf system_mount super_dump super.img super.raw.img

          FILE_COUNT=$(ls output | wc -l)
          [ "$FILE_COUNT" -eq 0 ] && { echo "❌ Nothing extracted!"; exit 1; }
          echo "✅ Extracted $FILE_COUNT items"

      - name: Upload to GoFile
        run: |
          cd output
          zip -r ../system-files.zip .
          cd ..
          bash upload_gofile.sh system-files.zip
          
