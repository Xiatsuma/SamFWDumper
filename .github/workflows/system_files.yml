name: System Files Extractor

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SamFW Direct Download Link'
        required: true
      upload_destination:
        description: 'Upload destination'
        required: true
        default: 'gofile'
        type: choice
        options:
        - 'gofile'
        - 'github releases'
      from_system:
        description: 'Extract from: system'
        type: boolean
        default: true
      from_vendor:
        description: 'Extract from: vendor'
        type: boolean
        default: false
      from_product:
        description: 'Extract from: product'
        type: boolean
        default: false
      from_system_ext:
        description: 'Extract from: system_ext'
        type: boolean
        default: false
      from_odm:
        description: 'Extract from: odm'
        type: boolean
        default: false
      extract_super_config:
        description: 'super config (Repack metadata for super.img)'
        type: boolean
        default: false
      extract_apex:
        description: 'apex'
        type: boolean
        default: false
      extract_app:
        description: 'app (Preinstalled APKs)'
        type: boolean
        default: false
      extract_priv_app:
        description: 'priv-app (Privileged APKs)'
        type: boolean
        default: false
      extract_etc:
        description: 'etc (Configs & permissions)'
        type: boolean
        default: false
      extract_config:
        description: 'config (XML feature & permission configs)'
        type: boolean
        default: false
      extract_framework:
        description: 'framework'
        type: boolean
        default: false
      extract_lib:
        description: 'lib (32-bit libraries)'
        type: boolean
        default: false
      extract_lib64:
        description: 'lib64 (64-bit libraries)'
        type: boolean
        default: false
      extract_media:
        description: 'media (Sounds, fonts, bootanimation)'
        type: boolean
        default: false
      extract_cameradata:
        description: 'cameradata (Camera tuning)'
        type: boolean
        default: false
      extract_build_prop:
        description: 'build.prop (Device properties)'
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            xz-utils \
            lz4 \
            unzip \
            curl \
            binutils \
            android-sdk-libsparse-utils \
            e2fsprogs

      - name: Make tools executable
        run: chmod +x bin/lp/* bin/ext4/* bin/erofs-utils/* bin/py_scripts/* upload_gofile.sh scripts/dump.sh

      - name: Get AP Info
        id: apinfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sL --range 0-2097151 "${{ github.event.inputs.url }}" > /tmp/fw_peek.bin
          AP_FILE=$(strings /tmp/fw_peek.bin | grep -oP 'AP_\w+\.(tar\.md5|tar)' | head -1)
          rm -f /tmp/fw_peek.bin
          AP_SEGMENT=$(echo "$AP_FILE" | cut -d'_' -f2)
          RELEASE_DATE=$(date +"%-d-%-m-%Y %-I:%M %p")
          BASE_TAG=$(date +"%d%m%Y_%H,%M,%S")
          RELEASE_TAG="$BASE_TAG"
          if gh release view "$RELEASE_TAG" &>/dev/null 2>&1; then
            SUFFIX=1
            while gh release view "${BASE_TAG}_${SUFFIX}" &>/dev/null 2>&1; do
              SUFFIX=$((SUFFIX + 1))
            done
            RELEASE_TAG="${BASE_TAG}_${SUFFIX}"
          fi
          echo "ap_segment=$AP_SEGMENT" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Extract firmware and partition files
        run: |
          PARTS=""
          ${{ github.event.inputs.from_system }} && PARTS="$PARTS system"
          ${{ github.event.inputs.from_vendor }} && PARTS="$PARTS vendor"
          ${{ github.event.inputs.from_product }} && PARTS="$PARTS product"
          ${{ github.event.inputs.from_system_ext }} && PARTS="$PARTS system_ext"
          ${{ github.event.inputs.from_odm }} && PARTS="$PARTS odm"
          PARTS="${PARTS# }"

          TARGETS=""
          ${{ github.event.inputs.extract_apex }} && TARGETS="$TARGETS apex"
          ${{ github.event.inputs.extract_app }} && TARGETS="$TARGETS app"
          ${{ github.event.inputs.extract_priv_app }} && TARGETS="$TARGETS priv-app"
          ${{ github.event.inputs.extract_etc }} && TARGETS="$TARGETS etc"
          ${{ github.event.inputs.extract_config }} && TARGETS="$TARGETS config"
          ${{ github.event.inputs.extract_configs }} && TARGETS="$TARGETS configs"
          ${{ github.event.inputs.extract_framework }} && TARGETS="$TARGETS framework"
          ${{ github.event.inputs.extract_lib }} && TARGETS="$TARGETS lib"
          ${{ github.event.inputs.extract_lib64 }} && TARGETS="$TARGETS lib64"
          ${{ github.event.inputs.extract_media }} && TARGETS="$TARGETS media"
          ${{ github.event.inputs.extract_cameradata }} && TARGETS="$TARGETS cameradata"
          ${{ github.event.inputs.extract_build_prop }} && TARGETS="$TARGETS build.prop"
          TARGETS="${TARGETS# }"

          WANT_SUPER_CONFIG="${{ github.event.inputs.extract_super_config }}"

          if [ -z "$PARTS" ] && [ "$WANT_SUPER_CONFIG" != "true" ]; then
            echo "❌ No partitions selected!"
            exit 1
          fi

          if [ -z "$TARGETS" ] && [ "$WANT_SUPER_CONFIG" != "true" ]; then
            echo "❌ No targets selected!"
            exit 1
          fi

          echo ""; echo "[1/5] Downloading firmware..."
          wget --no-check-certificate -O "firmware.zip" "${{ github.event.inputs.url }}" 2>&1 | tail -3
          [ ! -f "firmware.zip" ] && { echo "❌ Download failed"; exit 1; }
          echo "✅ Downloaded"

          echo ""; echo "[2/5] Extracting ZIP..."
          unzip -o "firmware.zip" >/dev/null 2>&1
          rm -f "firmware.zip"
          echo "✅ Done"

          echo ""; echo "[3/5] Extracting AP..."
          AP_FILE=$(find . -name "AP_*.tar.md5" -o -name "AP_*.tar" | head -n 1)
          [ -z "$AP_FILE" ] && { echo "❌ AP file not found"; exit 1; }
          tar --no-anchored --wildcards -xf "$AP_FILE" "*super.img*" 2>/dev/null || tar -xf "$AP_FILE" >/dev/null 2>&1
          rm -f "$AP_FILE"
          echo "✅ Done"

          echo ""; echo "[4/5] Preparing super.img..."
          SUPER_FILE=$(find . -maxdepth 1 -name "super.img*" | head -n 1)
          IS_LEGACY=false

          if [ -n "$SUPER_FILE" ] && [ -f "$SUPER_FILE" ]; then
            if [[ "$SUPER_FILE" == *.lz4 ]]; then
              lz4 -d "$SUPER_FILE" "super.img"
              SUPER_FILE="super.img"
            fi
            if file "$SUPER_FILE" | grep -q "sparse"; then
              simg2img "$SUPER_FILE" "super.raw.img" 2>/dev/null || bin/ext4/simg2img "$SUPER_FILE" "super.raw.img"
              SUPER_FILE="super.raw.img"
            fi
            mkdir -p super_dump
            bin/lp/lpunpack "$SUPER_FILE" super_dump

            if [ "$WANT_SUPER_CONFIG" = "true" ]; then
              mkdir -p output/super_config
              bin/lp/lpdump "$SUPER_FILE" > "output/super_config/lpdump.txt" 2>/dev/null || true
              find super_dump -maxdepth 1 \( -name "*.cfg" -o -name "*_partition*" -o -name "misc_info*" \) \
                -exec cp {} "output/super_config/" \; 2>/dev/null
              echo "✅ super config saved"
            fi
          else
            echo "  No super.img — legacy device"
            IS_LEGACY=true
          fi

          echo ""; echo "[5/5] Extracting partition contents..."
          mkdir -p output

          for PART in $PARTS; do
            echo ""; echo "  ── Partition: $PART ──"
            PART_IMG=""

            if $IS_LEGACY; then
              if [ "$PART" != "system" ]; then
                echo "  ⚠️ Legacy device — only system available, skipping $PART"
                continue
              fi
              PART_IMG=$(find . -maxdepth 1 \( -name "${PART}.img.lz4" -o -name "${PART}.img" \) | head -n 1)
              if [[ "$PART_IMG" == *.lz4 ]]; then
                lz4 -d "$PART_IMG" "${PART}.img"
                PART_IMG="${PART}.img"
              fi
              if file "$PART_IMG" | grep -q "sparse"; then
                simg2img "$PART_IMG" "${PART}_raw.img" 2>/dev/null
                PART_IMG="${PART}_raw.img"
              fi
            else
              PART_IMG=$(find super_dump -name "${PART}.img" -o -name "${PART}_a.img" | head -n 1)
            fi

            [ -z "$PART_IMG" ] && { echo "  ⚠️ ${PART}.img not found — skipping"; continue; }
            echo "  Found: $PART_IMG"

            EXTRACT_DIR="extracted_${PART}"
            mkdir -p "$EXTRACT_DIR"

            if bin/erofs-utils/extract.erofs -i "$PART_IMG" -x -o "$EXTRACT_DIR/" 2>/dev/null; then
              echo "  ✅ Extracted via erofs"
            else
              echo "  erofs failed — trying debugfs..."
              for TARGET in $TARGETS; do
                IS_FILE=false
                [ "$TARGET" = "build.prop" ] && IS_FILE=true
                if $IS_FILE; then
                  for SRC_PATH in "$TARGET" "${PART}/$TARGET"; do
                    if debugfs -R "stat $SRC_PATH" "$PART_IMG" 2>/dev/null | grep -q "Type: regular"; then
                      debugfs -R "dump $SRC_PATH $EXTRACT_DIR/$TARGET" "$PART_IMG" 2>/dev/null
                      echo "  ✅ $TARGET extracted via debugfs"
                      break
                    fi
                  done
                else
                  for SRC_PATH in "$TARGET" "${PART}/$TARGET"; do
                    if debugfs -R "ls $SRC_PATH" "$PART_IMG" 2>/dev/null | grep -q .; then
                      mkdir -p "$EXTRACT_DIR/$TARGET"
                      debugfs -R "rdump $SRC_PATH $EXTRACT_DIR/$TARGET" "$PART_IMG" 2>/dev/null
                      echo "  ✅ $TARGET extracted via debugfs"
                      break
                    fi
                  done
                fi
              done
            fi

            PART_ROOT="$EXTRACT_DIR"
            if [ -d "$EXTRACT_DIR/$PART" ]; then
              PART_ROOT="$EXTRACT_DIR/$PART"
            elif [ -d "$EXTRACT_DIR/${PART}_a" ]; then
              PART_ROOT="$EXTRACT_DIR/${PART}_a"
            fi

            echo "  Contents of $PART_ROOT:"
            ls "$PART_ROOT/" || true

            for TARGET in $TARGETS; do
              SRC="$PART_ROOT/$TARGET"
              if [ ! -e "$SRC" ]; then
                echo "  ⚠️ $TARGET not found in $PART"
                continue
              fi
              if [ -f "$SRC" ]; then
                xz -0 -T0 -c "$SRC" > "output/${PART}_${TARGET}.xz"
                echo "  ✅ ${PART}_${TARGET}.xz"
              else
                tar -cJf "output/${PART}_${TARGET}.tar.xz" -C "$PART_ROOT" "$TARGET"
                echo "  ✅ ${PART}_${TARGET}.tar.xz"
              fi
            done

            rm -rf "$EXTRACT_DIR"
          done

          rm -rf super_dump super.img super.raw.img

          FILE_COUNT=$(ls output | wc -l)
          [ "$FILE_COUNT" -eq 0 ] && { echo "❌ Nothing extracted!"; exit 1; }
          echo ""; echo "✅ Extracted $FILE_COUNT items:"
          ls -lh output/

      - name: Upload to GoFile
        if: ${{ github.event.inputs.upload_destination == 'gofile' }}
        run: |
          if [ -d "output" ] && [ "$(ls -A output)" ]; then
            cd output
            zip -r ../system-files.zip .
            cd ..
            bash upload_gofile.sh system-files.zip
          else
            echo "❌ No files to upload"
            exit 1
          fi

      - name: Upload to GitHub Releases
        if: ${{ github.event.inputs.upload_destination == 'github releases' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d "output" ] || [ -z "$(ls -A output)" ]; then
            echo "❌ No files to upload"
            exit 1
          fi

          NOTES_FILE=$(mktemp)
          ASSETS=()
          SIZE_LIMIT=2147483648

          for FILE in output/*; do
            [ -f "$FILE" ] || continue
            FILESIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            PART_NAME=$(echo "$BASENAME" | sed 's/\.tar\.xz$//' | sed 's/\.xz$//')

            if [ "$FILESIZE" -gt "$SIZE_LIMIT" ]; then
              if bash upload_gofile.sh "$FILE"; then
                GOFILE_URL=$(cat download_url.txt)
                echo "${PART_NAME}: ${GOFILE_URL}" >> "$NOTES_FILE"
              else
                echo "${PART_NAME}: ❌ GoFile upload failed" >> "$NOTES_FILE"
              fi
            else
              ASSETS+=("$FILE")
            fi
          done

          gh release create "${{ steps.apinfo.outputs.release_tag }}" \
            --title "${{ steps.apinfo.outputs.ap_segment }} | ${{ steps.apinfo.outputs.release_date }}" \
            --notes-file "$NOTES_FILE" \
            "${ASSETS[@]}"

          rm -f "$NOTES_FILE"
