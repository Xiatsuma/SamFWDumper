<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <!-- Premium gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#11131a"/>
      <stop offset="100%" stop-color="#0f0d15"/>
    </linearGradient>
    
    <!-- Multi-layer text shadow filter (the "good shadow control" you wanted) -->
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Layer 1: Sharp offset shadow -->
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.9"/>
      <!-- Layer 2: Soft ambient shadow -->
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
      <!-- Layer 3: Accent glow -->
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#ff6b35" flood-opacity="0.35"/>
    </filter>
    
    <!-- Subtle animated data-stream pattern (static for SVG) -->
    <pattern id="dataPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M10,0 L10,60 M0,10 L60,10" stroke="#2a2d3a" stroke-width="0.5" opacity="0.3"/>
      <circle cx="30" cy="30" r="1.5" fill="#ff6b35" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dataPattern)"/>
  
  <!-- Decorative diagonal accent -->
  <path d="M0,320 L200,0 L240,0 L40,320 Z" fill="#ff6b35" opacity="0.08"/>
  
  <!-- Main title: SamFWDumper with premium shadow -->
  <text x="640" y="145" 
        font-family="'Segoe UI', 'Inter', 'Roboto', system-ui, sans-serif" 
        font-size="68" 
        font-weight="800"
        fill="#ffffff" 
        text-anchor="middle"
        filter="url(#textShadow)"
        letter-spacing="-1">
    SamFWDumper
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="195" 
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
        font-size="22" 
        font-weight="400"
        fill="#b8c1d1" 
        text-anchor="middle"
        opacity="0.95">
    Automated Samsung Firmware Extraction • CLI • GitHub Actions
  </text>
  
  <!-- Tech accent dots -->
  <g fill="#ff6b35" opacity="0.7">
    <circle cx="420" cy="145" r="3"/>
    <circle cx="860" cy="145" r="3"/>
  </g>
  
  <!-- Bottom subtle gradient fade -->
  <rect x="0" y="280" width="1280" height="40" fill="url(#bg)" opacity="0.6"/>
</svg>
